name: Push-to_docker
on:
  workflow_call:
    inputs:
      frontend-dockerfile-dir: { required: true, type: string }
      backend-dockerfile-dir: { required: true, type: string }
    secrets:
      docker_username: { required: true }
      docker_password: { required: true }

jobs:
  docker-push:
    strategy:
      matrix:
        workdir: [ '${{ inputs.frontend-dockerfile-dir }}', '${{ inputs.backend-dockerfile-dir }}' ]      
    runs-on: ubuntu-latest
    steps:
      - name: code-checkout
        uses: actions/checkout@v6
      - name: docker login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.docker_username }}
          password: ${{ secrets.docker_password }}
          
      - name: Docker build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.workdir }}
          push: true
          tags: ${{ secrets.docker_username }}/devboard-${{ matrix.workdir }}:latest
      
