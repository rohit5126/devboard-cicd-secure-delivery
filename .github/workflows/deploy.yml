name: Code-deploy
on:
  workflow_call:

jobs:
  deploy_devboard:
    runs-on: self-hosted
    steps:
      - name: code-checkout
        uses: actions/checkout@v6
      - name: Copy .env
        run: cp .env.example .env
      - name: Docker login
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: deploy-app using compose
        run: |
          docker compose pull
          docker compose up -d
