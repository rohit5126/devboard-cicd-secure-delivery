name: PR-pipeline-checks
on:
  pull_request:
      branches: [master]
      types: [opened, synchronize]

jobs:
  Frontend-code-quality:
    uses: ./.github/workflows/Node-code-quality.yml
    with:
      node-version: 20
      package-path: frontend/package-lock.json
      code-path: frontend/
  Backend-code-quality:
    uses: ./.github/workflows/Go-code-quality.yml
    with:
      go-version: '1.23'
      go-version-file: backend/go.mod
      cache-dependency-path: backend/go.sum
      code-path: backend/
  Secret-scanner:
    uses: ./.github/workflows/secret-scanning.yml

  Dependency-check:
    uses: ./.github/workflows/security-check.yml
    with:
      backend_workdir: backend
      frontend_workdir: frontend

  Docker-lint-scan:
    needs: [ Dependency-check,Secret-scanner, Backend-code-quality, Frontend-code-quality ]
    uses: ./.github/workflows/docker-lint.yml
    with:
      frontend-dockerfile-dir: frontend
      backend-dockerfile-dir: backend
    secrets: 
      docker_username: ${{ vars.DOCKER_USER }}
      docker_password: ${{ secrets.DOCKER_TOKEN }}

  Add-comment:
    runs-on: ubuntu-latest
    needs: [Docker-lint-scan]
    permissions:
      pull-requests: write
    steps:
      - uses: mshick/add-pr-comment@v3
        with:
          message: |
            ### All CI Checks Completed Successfully
              **All automated validation steps for this pull request have passed.**

              **Completed checks include:**

              * Code quality analysis (Frontend & Backend)
              * Secret detection scan
              * Dependency vulnerability assessment
              * Vulnerbility reports created for frontend and backend
              * Docker build and lint validation

            **This pull request meets the required quality and security standards and is ready for review and merge.**


